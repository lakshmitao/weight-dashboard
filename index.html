<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SLK's Fat Loss Journey</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fatlo">
    <meta name="theme-color" content="#1c1c1c">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1c1c1c;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
            padding-top: calc(env(safe-area-inset-top, 20px) + 16px);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }
        h1 span { color: #e53935; }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 4px;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-card .value.positive { color: #ff6b6b; }
        .stat-card .value.negative { color: #51cf66; }

        /* Main Layout */
        .main-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .main-row .chart-container {
            flex: 1;
            margin-bottom: 0;
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            min-width: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        @media (max-width: 768px) {
            .main-row { flex-direction: column; }
            .sidebar { width: 100%; }
        }

        /* Input Form */
        .input-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-section .field input { width: 100%; max-width: 100%; box-sizing: border-box; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
        }
        .field input {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            width: 160px;
        }
        .field input:focus { border-color: #e53935; }
        button {
            background: #e53935;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c62828; }

        /* Chart */
        .chart-container {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-container canvas { width: 100% !important; }

        /* Log Table */
        .log-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
        }
        .log-section h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #aaa;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th {
            text-align: left;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            padding: 6px 6px;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }
        .log-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .log-table .change.positive { color: #ff6b6b; }
        .log-table .change.negative { color: #51cf66; }
        .log-table .change.neutral { color: #888; }
        .delete-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .delete-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .empty-state {
            text-align: center;
            color: #555;
            padding: 40px;
            font-size: 0.95rem;
        }

        /* Goal Section */
        .goal-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .goal-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .goal-section label { color: #888; font-size: 0.85rem; }
        .goal-section input {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            width: 100px;
        }
        .goal-section input:focus { border-color: #e53935; }
        .goal-section .goal-btn {
            background: #333;
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .progress-bar-container {
            flex: 1;
            min-width: 200px;
            background: #222;
            border-radius: 8px;
            height: 24px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e53935, #51cf66);
            border-radius: 8px;
            transition: width 0.5s ease;
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
        }

        /* Unit Toggle */
        .unit-toggle {
            display: flex;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .unit-toggle button {
            background: transparent;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 0;
            color: #888;
            transition: all 0.2s;
        }
        .unit-toggle button:hover { background: #333; }
        .unit-toggle button.active {
            background: #e53935;
            color: #fff;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header-row h1 { margin-bottom: 0; }

        /* Estimator */
        .estimator-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .estimator-section h3 {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 4px;
        }
        .estimator-section .field input,
        .estimator-section .field select {
            width: 100%;
        }
        .estimator-section select {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            -webkit-appearance: none;
        }
        .estimator-section select:focus { border-color: #e53935; }
        .estimate-result {
            background: #222;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .estimate-result .est-date {
            font-size: 1.2rem;
            font-weight: 700;
            color: #42a5f5;
        }
        .estimate-result .est-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 4px;
        }
        .estimate-result .est-detail {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
        }
        .gender-toggle {
            display: flex;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .gender-toggle button {
            flex: 1;
            background: transparent;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 0;
            color: #888;
        }
        .gender-toggle button:hover { background: #333; }
        .gender-toggle button.active { background: #e53935; color: #fff; }

        /* Macros */
        .macros-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .macros-section h2 {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .macros-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        @media (max-width: 600px) {
            .macros-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .macro-card {
            background: #222;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .macro-card .macro-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 6px;
        }
        .macro-card .macro-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .macro-card .macro-cals {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
        }
        .macro-card .macro-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            border-radius: 0 0 10px 10px;
        }
        .macro-card.calories .macro-value { color: #e53935; }
        .macro-card.protein .macro-bar { background: #42a5f5; }
        .macro-card.carbs .macro-bar { background: #ffa726; }
        .macro-card.fat .macro-bar { background: #ab47bc; }
        .macros-empty {
            color: #555;
            font-size: 0.85rem;
            text-align: center;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>SLK's <span>Fat Loss</span> Journey</h1>
            <div class="unit-toggle">
                <button id="btn-lbs" class="active" onclick="setUnit('lbs')">lbs</button>
                <button id="btn-kg" onclick="setUnit('kg')">kg</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="label">Maintenance</div>
                <div class="value" id="stat-maintenance">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Starting</div>
                <div class="value" id="stat-start">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Current</div>
                <div class="value" id="stat-current">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Lost</div>
                <div class="value" id="stat-lost">—</div>
            </div>
            <div class="stat-card">
                <div class="label">7-Day Avg</div>
                <div class="value" id="stat-avg">—</div>
            </div>
        </div>

        <!-- Macros -->
        <div class="macros-section">
            <h2>Suggested Daily Macros</h2>
            <div id="macros-content">
                <div class="macros-empty">Fill in the Goal Date Estimator to see your macros</div>
            </div>
        </div>

        <!-- Chart + Inputs Row -->
        <div class="main-row">
            <div class="chart-container">
                <canvas id="weight-chart" height="200"></canvas>
            </div>
            <div class="sidebar">
                <!-- Input -->
                <div class="input-section">
                    <div class="field">
                        <label>Date</label>
                        <input type="date" id="date-input">
                    </div>
                    <div class="field">
                        <label id="weight-label">Weight (lbs)</label>
                        <input type="number" id="weight-input" step="0.1" placeholder="e.g. 185.5">
                    </div>
                    <button onclick="addEntry()">Log Weight</button>
                </div>

                <!-- Goal -->
                <div class="goal-section">
                    <div class="goal-row">
                        <label>Goal:</label>
                        <input type="number" id="goal-input" step="0.1" placeholder="lbs">
                        <button class="goal-btn" onclick="setGoal()">Set</button>
                    </div>
                    <div class="progress-bar-container" id="progress-container" style="display:none">
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="progress-text" id="progress-text"></div>
                    </div>
                </div>

                <!-- Estimator -->
                <div class="estimator-section">
                    <h3>Goal Date Estimator</h3>
                    <div class="gender-toggle">
                        <button id="btn-male" class="active" onclick="setGender('male')">Male</button>
                        <button id="btn-female" onclick="setGender('female')">Female</button>
                    </div>
                    <div class="field">
                        <label>Age</label>
                        <input type="number" id="est-age" placeholder="e.g. 30" onchange="calcEstimate()">
                    </div>
                    <div class="field">
                        <label id="height-label">Height (in)</label>
                        <input type="number" id="est-height" step="0.1" placeholder="e.g. 70" onchange="calcEstimate()">
                    </div>
                    <div class="field">
                        <label id="est-weight-label">Current Weight (lbs)</label>
                        <input type="number" id="est-weight" step="0.1" placeholder="e.g. 188" onchange="calcEstimate()">
                    </div>
                    <div class="field">
                        <label>Activity Level</label>
                        <select id="est-activity" onchange="calcEstimate()">
                            <option value="1.2">Sedentary (desk job)</option>
                            <option value="1.375">Light (1-3 days/wk)</option>
                            <option value="1.55" selected>Moderate (3-5 days/wk)</option>
                            <option value="1.725">Active (6-7 days/wk)</option>
                            <option value="1.9">Very Active (2x/day)</option>
                        </select>
                    </div>
                    <div class="estimate-result" id="tdee-display" style="display:none">
                        <div class="est-label">Your TDEE</div>
                        <div class="est-date" id="tdee-value">—</div>
                        <div class="est-detail">calories/day to maintain weight</div>
                    </div>
                    <div class="field">
                        <label>My Daily Calories</label>
                        <input type="number" id="est-my-cals" placeholder="e.g. 1800" onchange="calcEstimate()">
                    </div>
                    <button onclick="calcEstimate()">Estimate</button>
                    <div class="estimate-result" id="est-result" style="display:none">
                        <div class="est-label">Estimated Goal Date</div>
                        <div class="est-date" id="est-date">—</div>
                        <div class="est-detail" id="est-detail"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Log -->
        <div class="log-section">
            <h2>Daily Log</h2>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        // Unit
        let currentUnit = localStorage.getItem('weightUnit') || 'lbs';
        const LBS_TO_KG = 0.453592;
        const KG_TO_LBS = 2.20462;

        function setUnit(unit) {
            currentUnit = unit;
            localStorage.setItem('weightUnit', unit);
            document.getElementById('btn-lbs').className = unit === 'lbs' ? 'active' : '';
            document.getElementById('btn-kg').className = unit === 'kg' ? 'active' : '';
            document.getElementById('weight-label').textContent = 'Weight (' + unit + ')';
            document.getElementById('weight-input').placeholder = unit === 'lbs' ? 'e.g. 185.5' : 'e.g. 84.0';
            document.getElementById('goal-input').placeholder = unit;
            document.getElementById('height-label').textContent = unit === 'kg' ? 'Height (cm)' : 'Height (in)';
            document.getElementById('est-weight-label').textContent = 'Current Weight (' + unit + ')';
            document.getElementById('est-height').placeholder = unit === 'kg' ? 'e.g. 178' : 'e.g. 70';
            render();
        }

        function toDisplay(lbs) { return currentUnit === 'kg' ? lbs * LBS_TO_KG : lbs; }
        function toLbs(val) { return currentUnit === 'kg' ? val * KG_TO_LBS : val; }
        function unitLabel() { return currentUnit; }

        // Google Sheets sync
        const SHEETS_API = 'https://script.google.com/macros/s/AKfycbzE8fE1o_iDr4p61mIV0HTJ-BbzT3IGtjHRAw-ViYXZcYzqs7w9EGiPwFzszHQAiFLK/exec';

        async function fetchFromSheet() {
            try {
                const res = await fetch(SHEETS_API);
                if (!res.ok) throw new Error('Sheet fetch failed');
                const rows = await res.json();
                saveData(rows);
                render();
            } catch (err) {
                console.warn('Sheet sync failed, using localStorage:', err);
            }
        }

        async function pushToSheet(date, weight) {
            try {
                await fetch(SHEETS_API, {
                    method: 'POST',
                    body: JSON.stringify({ date, weight }),
                });
            } catch (err) {
                console.warn('Failed to push to sheet:', err);
            }
        }

        async function deleteFromSheet(date) {
            try {
                await fetch(SHEETS_API, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', date }),
                });
            } catch (err) {
                console.warn('Failed to delete from sheet:', err);
            }
        }

        // Seed data from weight_cut_log.xls
        const SEED_DATA = [{"date":"2026-01-12","weight":196.0},{"date":"2026-01-13","weight":195.0},{"date":"2026-01-14","weight":194.9},{"date":"2026-01-15","weight":194.0},{"date":"2026-01-16","weight":193.3},{"date":"2026-01-17","weight":191.8},{"date":"2026-01-18","weight":195.7},{"date":"2026-01-19","weight":193.8},{"date":"2026-01-20","weight":194.9},{"date":"2026-01-21","weight":194.2},{"date":"2026-01-22","weight":194.0},{"date":"2026-01-23","weight":193.4},{"date":"2026-01-24","weight":192.5},{"date":"2026-01-25","weight":192.0},{"date":"2026-01-26","weight":191.2},{"date":"2026-01-27","weight":190.5},{"date":"2026-01-28","weight":192.2},{"date":"2026-01-29","weight":191.1},{"date":"2026-01-30","weight":190.4},{"date":"2026-01-31","weight":190.9},{"date":"2026-02-01","weight":0},{"date":"2026-02-02","weight":0},{"date":"2026-02-03","weight":0},{"date":"2026-02-04","weight":0},{"date":"2026-02-05","weight":0},{"date":"2026-02-06","weight":0},{"date":"2026-02-07","weight":0},{"date":"2026-02-08","weight":0},{"date":"2026-02-09","weight":0},{"date":"2026-02-10","weight":192.6},{"date":"2026-02-11","weight":192.6},{"date":"2026-02-12","weight":192.1},{"date":"2026-02-13","weight":191.8},{"date":"2026-02-14","weight":190.0},{"date":"2026-02-15","weight":0},{"date":"2026-02-16","weight":0},{"date":"2026-02-17","weight":0},{"date":"2026-02-18","weight":0},{"date":"2026-02-19","weight":0},{"date":"2026-02-20","weight":190.9},{"date":"2026-02-21","weight":192.3},{"date":"2026-02-22","weight":192.1},{"date":"2026-02-23","weight":188.6},{"date":"2026-02-24","weight":190.9},{"date":"2026-02-25","weight":188.9},{"date":"2026-02-26","weight":0},{"date":"2026-02-27","weight":0},{"date":"2026-02-28","weight":188.9},{"date":"2026-03-01","weight":188.9},{"date":"2026-03-02","weight":190.0},{"date":"2026-03-03","weight":189.1},{"date":"2026-03-04","weight":188.8},{"date":"2026-03-05","weight":187.5},{"date":"2026-03-06","weight":186.7},{"date":"2026-03-07","weight":190.0},{"date":"2026-03-08","weight":188.3},{"date":"2026-03-09","weight":186.6},{"date":"2026-03-10","weight":186.2},{"date":"2026-03-11","weight":186.2},{"date":"2026-03-12","weight":0},{"date":"2026-03-13","weight":0},{"date":"2026-03-14","weight":0},{"date":"2026-03-15","weight":0},{"date":"2026-03-16","weight":187.1},{"date":"2026-03-17","weight":187.3},{"date":"2026-03-18","weight":187.8},{"date":"2026-03-19","weight":188.3},{"date":"2026-03-20","weight":186.5},{"date":"2026-03-21","weight":188.0},{"date":"2026-03-22","weight":0},{"date":"2026-03-23","weight":0},{"date":"2026-03-24","weight":0},{"date":"2026-03-25","weight":0},{"date":"2026-03-26","weight":0},{"date":"2026-03-27","weight":0},{"date":"2026-03-28","weight":0},{"date":"2026-03-29","weight":186.0},{"date":"2026-03-30","weight":188.0}];

        if (!localStorage.getItem('weightData')) {
            localStorage.setItem('weightData', JSON.stringify(SEED_DATA));
        }

        // Data (always stored in lbs)
        function getData() {
            return JSON.parse(localStorage.getItem('weightData') || '[]');
        }
        function saveData(data) {
            localStorage.setItem('weightData', JSON.stringify(data));
        }
        function getGoal() {
            return parseFloat(localStorage.getItem('weightGoal')) || null;
        }

        // Init date input to today
        document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

        // Add entry
        function addEntry() {
            const dateInput = document.getElementById('date-input');
            const weightInput = document.getElementById('weight-input');
            const date = dateInput.value;
            const weight = parseFloat(weightInput.value);

            if (!date || isNaN(weight) || weight <= 0) return;
            const weightLbs = toLbs(weight);

            const data = getData();
            const existing = data.findIndex(d => d.date === date);
            if (existing >= 0) {
                data[existing].weight = weightLbs;
            } else {
                data.push({ date, weight: weightLbs });
            }
            data.sort((a, b) => a.date.localeCompare(b.date));
            saveData(data);

            weightInput.value = '';
            render();
            pushToSheet(date, weightLbs);
        }

        // Delete entry
        function deleteEntry(date) {
            const data = getData().filter(d => d.date !== date);
            saveData(data);
            render();
            deleteFromSheet(date);
        }

        // Set goal
        function setGoal() {
            const val = parseFloat(document.getElementById('goal-input').value);
            if (isNaN(val) || val <= 0) return;
            localStorage.setItem('weightGoal', toLbs(val));
            render();
        }

        // Trend line (linear regression)
        function calcTrendLine(data) {
            const valid = data.filter(d => d.weight > 0);
            if (valid.length < 2) return [];
            const t0 = new Date(valid[0].date + 'T00:00:00').getTime();
            const xs = valid.map(d => (new Date(d.date + 'T00:00:00').getTime() - t0) / 86400000);
            const ys = valid.map(d => toDisplay(d.weight));
            const n = xs.length;
            const sumX = xs.reduce((a, b) => a + b, 0);
            const sumY = ys.reduce((a, b) => a + b, 0);
            const sumXY = xs.reduce((a, x, i) => a + x * ys[i], 0);
            const sumX2 = xs.reduce((a, x) => a + x * x, 0);
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return data.map(d => {
                const x = (new Date(d.date + 'T00:00:00').getTime() - t0) / 86400000;
                return { x: d.date, y: slope * x + intercept };
            });
        }

        // Chart
        let chart = null;
        function renderChart(data) {
            const ctx = document.getElementById('weight-chart').getContext('2d');
            const goal = getGoal();

            const chartData = {
                datasets: [{
                    label: 'Weight (' + unitLabel() + ')',
                    data: data.map(d => ({ x: d.date, y: toDisplay(d.weight) })),
                    borderColor: '#e53935',
                    backgroundColor: 'rgba(229, 57, 53, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#e53935',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 1,
                }]
            };

            // Trend line
            if (data.length >= 2) {
                chartData.datasets.push({
                    label: 'Trend',
                    data: calcTrendLine(data),
                    borderColor: '#42a5f5',
                    borderWidth: 2,
                    borderDash: [4, 4],
                    pointRadius: 0,
                    fill: false,
                });
            }

            if (goal && data.length > 0) {
                chartData.datasets.push({
                    label: 'Goal',
                    data: [
                        { x: data[0].date, y: toDisplay(goal) },
                        { x: data[data.length - 1].date, y: toDisplay(goal) }
                    ],
                    borderColor: '#51cf66',
                    borderDash: [6, 4],
                    pointRadius: 0,
                    fill: false,
                });
            }

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day', tooltipFormat: 'MMM d, yyyy' },
                            grid: { color: '#222' },
                            ticks: { color: '#666' }
                        },
                        y: {
                            min: 150,
                            max: 220,
                            grid: { color: '#222' },
                            ticks: { color: '#666' }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#2a2a2a',
                            titleColor: '#fff',
                            bodyColor: '#ccc',
                            borderColor: '#333',
                            borderWidth: 1,
                        }
                    }
                }
            });
        }

        // Stats
        function renderStats(data) {
            const startEl = document.getElementById('stat-start');
            const currentEl = document.getElementById('stat-current');
            const lostEl = document.getElementById('stat-lost');
            const avgEl = document.getElementById('stat-avg');

            if (data.length === 0) {
                startEl.textContent = '—';
                currentEl.textContent = '—';
                lostEl.textContent = '—';
                avgEl.textContent = '—';
                return;
            }

            const start = toDisplay(data[0].weight);
            const current = toDisplay(data[data.length - 1].weight);
            const lost = current - start;

            const u = ' ' + unitLabel();
            startEl.textContent = start.toFixed(1) + u;
            currentEl.textContent = current.toFixed(1) + u;

            lostEl.textContent = (lost > 0 ? '+' : '') + lost.toFixed(1) + u;
            lostEl.className = 'value ' + (lost > 0 ? 'positive' : lost < 0 ? 'negative' : '');

            // 7-day avg (exclude 0s)
            const valid = data.filter(d => d.weight > 0);
            const last7 = valid.slice(-7);
            const avg = last7.length > 0 ? last7.reduce((s, d) => s + toDisplay(d.weight), 0) / last7.length : 0;
            avgEl.textContent = avg > 0 ? avg.toFixed(1) + ' ' + unitLabel() : '—';
        }

        // Goal progress
        function renderGoal(data) {
            const goal = getGoal();
            const container = document.getElementById('progress-container');
            const input = document.getElementById('goal-input');

            if (goal) input.value = toDisplay(goal).toFixed(1);
            if (!goal || data.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            const start = data[0].weight;
            const current = data[data.length - 1].weight;
            const totalToLose = start - goal;
            const actuallyLost = start - current;
            const pct = totalToLose > 0 ? Math.min(100, Math.max(0, (actuallyLost / totalToLose) * 100)) : 0;

            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').textContent = pct.toFixed(0) + '% to goal';
        }

        // Log table
        function renderLog(data) {
            const container = document.getElementById('log-content');
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">No entries yet. Log your first weight above!</div>';
                return;
            }

            const reversed = [...data].reverse();
            let html = '<table class="log-table"><thead><tr><th>Date</th><th>Weight</th><th>Change</th><th></th></tr></thead><tbody>';

            reversed.forEach((entry, i) => {
                const idx = data.length - 1 - i;
                const prev = idx > 0 ? toDisplay(data[idx - 1].weight) : null;
                const w = toDisplay(entry.weight);
                const change = prev !== null ? w - prev : 0;
                const changeStr = prev === null ? '—' : (change > 0 ? '+' : '') + change.toFixed(1);
                const changeClass = prev === null ? 'neutral' : (change > 0 ? 'positive' : change < 0 ? 'negative' : 'neutral');

                const dateObj = new Date(entry.date + 'T00:00:00');
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                html += `<tr>
                    <td>${dateStr}</td>
                    <td>${w.toFixed(1)} ${unitLabel()}</td>
                    <td class="change ${changeClass}">${changeStr}</td>
                    <td><button class="delete-btn" onclick="deleteEntry('${entry.date}')" title="Delete">×</button></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Estimator
        let estGender = localStorage.getItem('estGender') || 'male';
        function setGender(g) {
            estGender = g;
            localStorage.setItem('estGender', g);
            document.getElementById('btn-male').className = g === 'male' ? 'active' : '';
            document.getElementById('btn-female').className = g === 'female' ? 'active' : '';
            calcEstimate();
        }

        function calcEstimate() {
            const age = parseFloat(document.getElementById('est-age').value);
            const heightIn = parseFloat(document.getElementById('est-height').value);
            const weightVal = parseFloat(document.getElementById('est-weight').value);
            const activity = parseFloat(document.getElementById('est-activity').value);
            const myCals = parseFloat(document.getElementById('est-my-cals').value);
            const goal = getGoal();
            const resultEl = document.getElementById('est-result');
            const tdeeDisplay = document.getElementById('tdee-display');

            if (!age || !heightIn || !weightVal) {
                tdeeDisplay.style.display = 'none';
                resultEl.style.display = 'none';
                return;
            }

            // Convert inputs to lbs/inches for calculation
            const weightLbs = toLbs(weightVal);
            const heightCm = currentUnit === 'kg' ? heightIn : heightIn * 2.54;
            const weightKg = weightLbs * LBS_TO_KG;
            const goalLbs = goal;

            // Mifflin-St Jeor BMR
            let bmr;
            if (estGender === 'male') {
                bmr = 10 * weightKg + 6.25 * heightCm - 5 * age + 5;
            } else {
                bmr = 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
            }

            const tdee = bmr * activity;

            // Show TDEE
            tdeeDisplay.style.display = 'block';
            document.getElementById('tdee-value').textContent = Math.round(tdee) + ' cal';
            document.getElementById('stat-maintenance').textContent = Math.round(tdee) + ' cal';

            // Need goal and calorie input for date estimate
            if (!goal || !myCals) {
                resultEl.style.display = 'none';
                // Still calculate macros if we have calories
                if (myCals) {
                    renderMacros(myCals, weightLbs);
                }
                savEstInputs(age, heightIn, weightVal, activity, myCals);
                return;
            }

            if (weightLbs <= goalLbs) {
                resultEl.style.display = 'block';
                document.getElementById('est-date').textContent = 'Already there!';
                document.getElementById('est-detail').textContent = '';
                renderMacros(myCals, weightLbs);
                savEstInputs(age, heightIn, weightVal, activity, myCals);
                return;
            }

            const deficit = tdee - myCals;
            if (deficit <= 0) {
                resultEl.style.display = 'block';
                document.getElementById('est-date').textContent = 'Not losing';
                document.getElementById('est-detail').textContent = 'Your calories are at or above TDEE';
                renderMacros(myCals, weightLbs);
                savEstInputs(age, heightIn, weightVal, activity, myCals);
                return;
            }

            // 1 lb fat = ~3500 calories
            const lbsPerDay = deficit / 3500;
            const totalToLose = weightLbs - goalLbs;
            const daysNeeded = Math.ceil(totalToLose / lbsPerDay);

            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + daysNeeded);
            const dateStr = targetDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const weeks = Math.round(daysNeeded / 7);
            const lbsPerWeek = (lbsPerDay * 7).toFixed(1);

            resultEl.style.display = 'block';
            document.getElementById('est-date').textContent = dateStr;
            document.getElementById('est-detail').textContent =
                `~${weeks} weeks | ~${toDisplay(parseFloat(lbsPerWeek)).toFixed(1)} ${unitLabel()}/wk | deficit: ${Math.round(deficit)} cal/day`;

            renderMacros(myCals, weightLbs);
            savEstInputs(age, heightIn, weightVal, activity, myCals);
        }

        function savEstInputs(age, height, weight, activity, cals) {
            localStorage.setItem('estAge', age);
            localStorage.setItem('estHeight', height);
            localStorage.setItem('estWeight', weight);
            localStorage.setItem('estActivity', activity);
            if (cals) localStorage.setItem('estMyCals', cals);
        }

        function renderMacros(targetCals, weightLbs) {
            targetCals = Math.round(targetCals);
            // Protein: 1.2g per lb bodyweight (high protein)
            const proteinG = Math.round(weightLbs * 1.2);
            const proteinCals = proteinG * 4;
            // Fat: 25% of remaining calories
            const remainingCals = targetCals - proteinCals;
            const fatCals = Math.round(Math.max(remainingCals * 0.35, weightLbs * 0.3 * 9));
            const fatG = Math.round(fatCals / 9);
            // Carbs: whatever's left
            const carbsCals = Math.max(0, targetCals - proteinCals - fatCals);
            const carbsG = Math.round(carbsCals / 4);

            const macrosEl = document.getElementById('macros-content');
            const pPct = Math.round((proteinCals / targetCals) * 100);
            const cPct = Math.round((carbsCals / targetCals) * 100);
            const fPct = Math.round((fatCals / targetCals) * 100);

            macrosEl.innerHTML = `
                <div class="macros-grid">
                    <div class="macro-card calories">
                        <div class="macro-label">Calories</div>
                        <div class="macro-value">${targetCals}</div>
                        <div class="macro-cals">cal/day</div>
                    </div>
                    <div class="macro-card protein">
                        <div class="macro-label">Protein</div>
                        <div class="macro-value">${proteinG}g</div>
                        <div class="macro-cals">${proteinCals} cal (${pPct}%)</div>
                        <div class="macro-bar" style="width:${pPct}%"></div>
                    </div>
                    <div class="macro-card carbs">
                        <div class="macro-label">Carbs</div>
                        <div class="macro-value">${carbsG}g</div>
                        <div class="macro-cals">${carbsCals} cal (${cPct}%)</div>
                        <div class="macro-bar" style="width:${cPct}%"></div>
                    </div>
                    <div class="macro-card fat">
                        <div class="macro-label">Fat</div>
                        <div class="macro-value">${fatG}g</div>
                        <div class="macro-cals">${fatCals} cal (${fPct}%)</div>
                        <div class="macro-bar" style="width:${fPct}%"></div>
                    </div>
                </div>`;
        }

        // Restore estimator inputs
        function restoreEstimator() {
            const age = localStorage.getItem('estAge');
            const height = localStorage.getItem('estHeight');
            const weight = localStorage.getItem('estWeight');
            const activity = localStorage.getItem('estActivity');
            const myCals = localStorage.getItem('estMyCals');
            if (age) document.getElementById('est-age').value = age;
            if (height) document.getElementById('est-height').value = height;
            if (weight) document.getElementById('est-weight').value = weight;
            if (activity) document.getElementById('est-activity').value = activity;
            if (myCals) document.getElementById('est-my-cals').value = myCals;
            setGender(estGender);
        }

        // Render all
        function render() {
            const data = getData();
            renderStats(data);
            renderGoal(data);
            renderChart(data);
            renderLog(data);
        }

        // Enter key to submit
        document.getElementById('weight-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addEntry();
        });

        setUnit(currentUnit);
        restoreEstimator();
        render();
        fetchFromSheet();

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
